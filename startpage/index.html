<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>startpage | wrk.money</title>
    <meta name="description" content="ad-free search, personalized for you.">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root {
            --glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --dim: rgba(255,255,255,0.25);
            --dimmer: rgba(255,255,255,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
        }

        /* ── Header ──────────────────────────────────────────── */
        .site-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 46px;
            background: rgba(10,10,10,0.85);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }

        .header-logo {
            font-size: 0.68rem; opacity: 0.35; letter-spacing: 3px;
            text-decoration: none; color: #fff; transition: opacity 0.2s;
        }
        .header-logo:hover { opacity: 0.7; }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .header-btn {
            font-size: 0.6rem; letter-spacing: 2px; padding: 5px 13px;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
            background: transparent; color: #fff; text-decoration: none;
            font-family: 'JetBrains Mono', monospace; cursor: pointer;
            transition: all 0.2s; text-transform: lowercase;
        }
        .header-btn:hover { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.04); }

        /* user chip */
        .user-chip {
            position: relative;
            display: none;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 10px 4px 6px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            transition: all 0.2s;
            background: transparent;
        }
        .user-chip:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.03); }
        .user-chip.visible { display: flex; }

        .user-avatar {
            width: 22px; height: 22px; border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.15);
            object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .user-name {
            font-size: 0.62rem; letter-spacing: 1.5px;
            opacity: 0.7; text-transform: lowercase;
            max-width: 120px; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .chip-caret { font-size: 0.45rem; opacity: 0.4; }

        .chip-dropdown {
            position: absolute; top: calc(100% + 8px); right: 0;
            min-width: 140px;
            background: rgba(12,12,12,0.95);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            backdrop-filter: blur(16px);
            overflow: hidden;
            opacity: 0; pointer-events: none;
            transform: translateY(-6px);
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .chip-dropdown.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .chip-dropdown a, .chip-dropdown button {
            display: block; width: 100%;
            padding: 10px 14px;
            font-size: 0.58rem; letter-spacing: 2px;
            color: rgba(255,255,255,0.5);
            text-decoration: none; text-align: left; text-transform: lowercase;
            font-family: 'JetBrains Mono', monospace;
            background: transparent; border: none; cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chip-dropdown a:last-child, .chip-dropdown button:last-child { border-bottom: none; }
        .chip-dropdown a:hover, .chip-dropdown button:hover {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.9);
        }
        .chip-dropdown button { color: rgba(255,100,100,0.5); }
        .chip-dropdown button:hover { color: rgba(255,120,120,0.9); background: rgba(255,80,80,0.06); }

        /* ── Particles ──────────────────────────────────────── */
        #tsparticles { position: fixed; inset: 0; z-index: 0; }

        /* ── Main ───────────────────────────────────────────── */
        .main {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 46px 20px 60px;
            gap: 0;
        }

        .date-line {
            font-size: 0.58rem;
            letter-spacing: 5px;
            opacity: 0.18;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .clock {
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.88;
            margin-bottom: 28px;
            font-variant-numeric: tabular-nums;
        }

        .greeting {
            font-size: 0.72rem;
            letter-spacing: 3px;
            opacity: 0;
            text-transform: lowercase;
            margin-bottom: 32px;
            min-height: 1.1rem;
            transition: opacity 0.6s ease;
            color: rgba(255,255,255,0.45);
        }
        .greeting.visible { opacity: 1; }

        /* ── Search ─────────────────────────────────────────── */
        .search-wrap {
            width: 100%;
            max-width: 540px;
            position: relative;
        }

        .search-form {
            width: 100%;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 15px 22px;
            font-size: 0.95rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 4px;
            color: #fff;
            outline: none;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.2); }
        .search-input:focus {
            border-color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.05);
        }

        .suggestions {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: rgba(10,10,10,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            backdrop-filter: blur(16px);
            overflow: hidden;
            display: none;
            z-index: 50;
        }
        .suggestion-item {
            padding: 12px 22px;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.selected {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.9);
            padding-left: 28px;
        }

        /* ── Typewriter strip ───────────────────────────────── */
        .typewriter-line {
            margin-top: 18px;
            font-size: 0.58rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.18);
            min-height: 1rem;
            text-align: center;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 1px; height: 0.9em;
            background: rgba(255,255,255,0.3);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        /* ── Shortcuts ──────────────────────────────────────── */
        .shortcuts-toggle {
            position: fixed; bottom: 28px; right: 20px; z-index: 50;
            width: 30px; height: 30px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(10,10,10,0.6);
            backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.3);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .shortcuts-toggle:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

        .shortcuts-panel {
            position: fixed; bottom: 70px; right: 20px; z-index: 50;
            width: 220px;
            background: rgba(10,10,10,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            padding: 16px 18px;
            backdrop-filter: blur(16px);
            opacity: 0; pointer-events: none;
            transform: translateY(10px);
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
        }
        .shortcuts-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .shortcuts-label {
            font-size: 0.5rem; letter-spacing: 3px;
            opacity: 0.25; text-transform: uppercase;
            margin-bottom: 12px;
        }
        .shortcut-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
            font-size: 0.62rem;
            color: rgba(255,255,255,0.4);
        }
        .shortcut-row:last-child { margin-bottom: 0; }
        .shortcut-key {
            font-size: 0.55rem; letter-spacing: 1px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            padding: 2px 7px;
            color: rgba(255,255,255,0.6);
            min-width: 32px; text-align: center;
            flex-shrink: 0;
        }

        /* ── Footer ─────────────────────────────────────────── */
        .console-footer {
            position: fixed;
            bottom: 10px; left: 0;
            font-size: 0.52rem; opacity: 0.1;
            letter-spacing: 4px;
            width: 100%; text-align: center; z-index: 1;
            pointer-events: none;
        }

        form button { display: none; }

        @media (max-width: 480px) {
            .clock { font-size: 2.4rem; }
            .search-wrap { max-width: 100%; }
            .user-name { display: none; }
        }
    </style>
</head>
<body>

<header class="site-header">
    <a href="/" class="header-logo">wrk.money</a>
    <div class="header-right">
        <div class="user-chip" id="user-chip" onclick="toggleChip()">
            <img class="user-avatar" id="user-avatar" src="/wrk_files/999circle.png" alt="">
            <span class="user-name" id="user-name"></span>
            <span class="chip-caret">▼</span>
            <div class="chip-dropdown" id="chip-dropdown">
                <a href="/settings">settings</a>
                <a href="/directory">directory</a>
                <button onclick="logout(event)">logout</button>
            </div>
        </div>
        <a href="/login" class="header-btn" id="login-btn" style="display:none">login</a>
    </div>
</header>

<div id="tsparticles"></div>

<main class="main">
    <div class="date-line" id="date-line">loading...</div>
    <div class="clock" id="clock">--:--:-- --</div>
    <div class="greeting" id="greeting">search.</div>

    <div class="search-wrap">
        <form class="search-form" id="search-form" action="https://www.startpage.com/do/search" method="GET">
            <input class="search-input" id="search-input" type="text" name="query"
                placeholder="search startpage..." autofocus autocomplete="off">
            <div class="suggestions" id="suggestions"></div>
            <button type="submit">go</button>
        </form>
        <div class="typewriter-line" id="typewriter-line">
            <span id="typewriter"></span><span class="typewriter-cursor"></span>
        </div>
    </div>
</main>

<button class="shortcuts-toggle" id="shortcuts-toggle" title="shortcuts (/)">?</button>
<div class="shortcuts-panel" id="shortcuts-panel">
    <div class="shortcuts-label">quick commands</div>
    <div class="shortcut-row"><span class="shortcut-key">?y</span> youtube</div>
    <div class="shortcut-row"><span class="shortcut-key">?x</span> x / twitter</div>
    <div class="shortcut-row"><span class="shortcut-key">?gh</span> github</div>
    <div class="shortcut-row"><span class="shortcut-key">?r</span> reddit</div>
    <div class="shortcut-row"><span class="shortcut-key">?ai</span> claude</div>
    <div class="shortcut-row"><span class="shortcut-key">?c</span> coinbase</div>
    <div class="shortcut-row"><span class="shortcut-key">?g</span> gmail</div>
    <div class="shortcut-row"><span class="shortcut-key">?s</span> spacemail</div>
</div>

<div class="console-footer">STARTPAGE // WRK_00</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
// ── Particles ──────────────────────────────────────────────────────────────
tsParticles.load("tsparticles", {
    particles: {
        number: { value: 60, density: { enable: true, area: 900 } },
        color: { value: "#ffffff" }, shape: { type: "circle" },
        opacity: { value: 0.2 }, size: { value: { min: 1, max: 2 } },
        links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.1, width: 1 },
        move: { enable: true, speed: 0.5, direction: "none", outModes: { default: "out" } }
    },
    interactivity: {
        events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
        modes: { grab: { distance: 140, links: { opacity: 0.3 } }, push: { quantity: 2 } }
    },
    retina_detect: true
});

// ── Clock & Date ───────────────────────────────────────────────────────────
function updateClock() {
    const now = new Date();
    const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
    document.getElementById('date-line').textContent =
        `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
        `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── Greeting ───────────────────────────────────────────────────────────────
function getTimeGreeting() {
    const h = new Date().getHours();
    if (h >= 5  && h < 12) return 'good morning';
    if (h >= 12 && h < 17) return 'good afternoon';
    if (h >= 17 && h < 21) return 'good evening';
    return 'good night';
}

function setGreeting(name) {
    const el = document.getElementById('greeting');
    el.textContent = name ? `${getTimeGreeting()}, ${name}.` : 'search.';
    el.classList.add('visible');
}

// ── Auth / Personalization (non-blocking) ──────────────────────────────────
(async () => {
    const token = localStorage.getItem('wrk_token');
    if (!token) {
        document.getElementById('login-btn').style.display = '';
        setGreeting(null);
        return;
    }
    try {
        const res = await fetch('https://api.wrk.money/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error();
        const { profile, slug } = await res.json();
        const displayName = profile?.displayName || slug || 'user';
        const avatar = profile?.avatar || '/wrk_files/999circle.png';

        document.getElementById('user-avatar').src = avatar;
        document.getElementById('user-name').textContent = displayName;
        document.getElementById('user-chip').classList.add('visible');
        setGreeting(displayName);
    } catch {
        localStorage.removeItem('wrk_token');
        document.getElementById('login-btn').style.display = '';
        setGreeting(null);
    }
})();

// ── User chip dropdown ─────────────────────────────────────────────────────
function toggleChip() {
    document.getElementById('chip-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
    if (!e.target.closest('#user-chip'))
        document.getElementById('chip-dropdown').classList.remove('open');
});
function logout(e) {
    e.stopPropagation();
    localStorage.removeItem('wrk_token');
    localStorage.removeItem('wrk_slug');
    window.location.href = '/login';
}

// ── Typewriter ─────────────────────────────────────────────────────────────
const phrases = [
    "no ads. no trackers. ever.",
    "privacy is your right.",
    "999 wrld.",
    "execution over excuses.",
    "in relentless pursuit.",
    "control the controllable.",
    "simplicity is the ultimate sophistication.",
    "google is shit anyways.",
    "keep the terminal transparent.",
    "stay caffeinated, stay up.",
];
let tIdx = Math.floor(Math.random() * phrases.length);
let tChar = 0, tDel = false;
const tEl = document.getElementById('typewriter');

function type() {
    const phrase = phrases[tIdx];
    tEl.textContent = phrase.substring(0, tDel ? tChar - 1 : tChar + 1);
    tChar = tDel ? tChar - 1 : tChar + 1;
    let speed = tDel ? 40 : 80;
    if (!tDel && tChar === phrase.length) { speed = 2800; tDel = true; }
    else if (tDel && tChar === 0) {
        tDel = false;
        let next;
        do { next = Math.floor(Math.random() * phrases.length); } while (next === tIdx);
        tIdx = next;
        speed = 400;
    }
    setTimeout(type, speed);
}
type();

// ── Search shortcuts ───────────────────────────────────────────────────────
const shortcutMap = {
    '?y':  'https://www.youtube.com',
    '?x':  'https://x.com',
    '?gh': 'https://github.com',
    '?r':  'https://www.reddit.com',
    '?ai': 'https://claude.ai',
    '?c':  'https://www.coinbase.com',
    '?g':  'https://mail.google.com',
    '?s':  'https://spacemail.com',
};

const searchForm = document.getElementById('search-form');
const searchInput = document.getElementById('search-input');
const suggBox = document.getElementById('suggestions');
let selIdx = -1;

searchForm.addEventListener('submit', e => {
    const q = searchInput.value.trim().toLowerCase();
    if (shortcutMap[q]) { e.preventDefault(); window.location.href = shortcutMap[q]; }
});

// ── Autocomplete ───────────────────────────────────────────────────────────
searchInput.addEventListener('input', () => {
    const q = searchInput.value;
    if (q.length < 2 || q.startsWith('?')) { suggBox.style.display = 'none'; return; }
    const s = document.createElement('script');
    s.src = `https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(q)}&callback=showSugg`;
    document.body.appendChild(s);
    document.body.removeChild(s);
});

window.showSugg = data => {
    const results = data[1].slice(0, 5);
    if (!results.length) { suggBox.style.display = 'none'; return; }
    suggBox.innerHTML = results.map(s => `<div class="suggestion-item">${s}</div>`).join('');
    suggBox.style.display = 'block';
    selIdx = -1;
    suggBox.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => { searchInput.value = item.textContent; searchForm.submit(); });
    });
};

searchInput.addEventListener('keydown', e => {
    const items = suggBox.querySelectorAll('.suggestion-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { selIdx = (selIdx + 1) % items.length; updateSel(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp') { selIdx = (selIdx - 1 + items.length) % items.length; updateSel(items); e.preventDefault(); }
    else if (e.key === 'Enter' && selIdx > -1) { e.preventDefault(); searchInput.value = items[selIdx].textContent; searchForm.submit(); }
    else if (e.key === 'Escape') { suggBox.style.display = 'none'; selIdx = -1; }
});

function updateSel(items) { items.forEach((item, i) => item.classList.toggle('selected', i === selIdx)); }
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) { suggBox.style.display = 'none'; selIdx = -1; } });

// ── Shortcuts panel ────────────────────────────────────────────────────────
const panel = document.getElementById('shortcuts-panel');
document.getElementById('shortcuts-toggle').addEventListener('click', () => panel.classList.toggle('open'));
document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); panel.classList.toggle('open'); }
    if (e.key === 'Escape') panel.classList.remove('open');
});
document.addEventListener('click', e => {
    if (!e.target.closest('#shortcuts-panel') && !e.target.closest('#shortcuts-toggle'))
        panel.classList.remove('open');
});
</script>
</body>
</html>
