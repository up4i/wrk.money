<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login | wrk.money</title>
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root { --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body {
            background: #0a0a0a; min-height: 100vh; display: flex;
            justify-content: center; align-items: center; color: #fff;
            position: relative; padding: 20px;
        }
        #tsparticles { position: fixed; inset: 0; z-index: 0; }
        .container { position: relative; z-index: 1; width: 100%; max-width: 360px; }
        h1 {
            font-size: 2rem; font-weight: 700; letter-spacing: 4px;
            text-transform: lowercase; opacity: 0.9; margin-bottom: 2rem; text-align: center;
        }
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; padding: 28px 24px;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px; margin-bottom: 8px; }
        input {
            width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 4px; color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; padding: 11px 14px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: rgba(255,255,255,0.35); }
        input::placeholder { opacity: 0.2; }
        button {
            width: 100%; margin-top: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem; letter-spacing: 2px; text-transform: lowercase;
            padding: 12px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
        }
        button:hover:not(:disabled) { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.5); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .error { display: none; font-size: 0.7rem; color: #ff6b6b; margin-top: 12px; letter-spacing: 1px; }
        .error.visible { display: block; }
        .footer { position: fixed; bottom: 30px; width: 100%; text-align: center; left: 0; z-index: 1; font-size: 0.6rem; opacity: 0.2; letter-spacing: 4px; }
    </style>
</head>
<body>
<div id="tsparticles"></div>
<div class="container">
    <h1>login</h1>
    <div class="card">
        <div class="field">
            <label for="username">username</label>
            <input id="username" type="text" placeholder="username" autocomplete="username">
        </div>
        <div class="field">
            <label for="password">password</label>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button id="submit">sign in</button>
        <div class="error" id="error"></div>
    </div>
    <a href="/setup" style="display:block;text-align:center;margin-top:20px;font-size:0.6rem;opacity:0.3;letter-spacing:2px;text-decoration:none;color:#fff;transition:opacity 0.2s" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=0.3">first time? set your password →</a>
    <div style="text-align:center;margin-top:28px;font-size:0.58rem;opacity:0.18;letter-spacing:2px;line-height:1.8">
        don't have an account?<br>
        <a href="https://t.me/ogkush" target="_blank" rel="noopener" style="color:#fff;opacity:1;text-decoration:underline;text-underline-offset:3px;transition:opacity 0.2s" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">dm me on telegram</a>
    </div>
</div>
<div class="footer">WRK.MONEY // LOGIN</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" }, shape: { type: "circle" },
            opacity: { value: 0.3 }, size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, outModes: { default: "out" } }
        },
        interactivity: { events: { onHover: { enable: true, mode: "grab" } }, modes: { grab: { distance: 140, links: { opacity: 0.5 } } } },
        retina_detect: true
    });

    const _redirectTo = new URLSearchParams(location.search).get('from') || '/settings';
    if (localStorage.getItem('wrk_token')) window.location.href = _redirectTo;

    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const submitBtn  = document.getElementById('submit');
    const errorEl    = document.getElementById('error');

    async function doLogin() {
        const username = usernameEl.value.trim();
        const password = passwordEl.value;
        if (!username || !password) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'signing in...';
        errorEl.classList.remove('visible');

        try {
            const res = await fetch('https://api.wrk.money/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'login failed');
            localStorage.setItem('wrk_token', data.token);
            localStorage.setItem('wrk_slug', data.slug);
            window.location.href = _redirectTo;
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.classList.add('visible');
            submitBtn.disabled = false;
            submitBtn.textContent = 'sign in';
        }
    }

    submitBtn.addEventListener('click', doLogin);
    passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    usernameEl.addEventListener('keydown', e => { if (e.key === 'Enter') passwordEl.focus(); });
</script>
</body>
</html>
