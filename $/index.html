            developer: { src: '/wrk_files/badge-developer.svg', label: 'developer' },
        };

        async function loadProfile() {
            let bg = 'network';
            try {
                const res = await fetch('https://api.wrk.money/profile/$');
                if (res.ok) {
                    const p = await res.json();
                    if (p.avatar) document.querySelector('.pfp').src = p.avatar;
                    if (p.uid !== undefined && p.uid !== null) document.getElementById('p-uid').textContent = 'UID #' + p.uid;
                    if (p.badges?.length) {
                        document.querySelectorAll('.badge-container[data-system]').forEach(b => b.remove());
                        p.badges.forEach(id => {
                            const b = BADGE_DEFS[id]; if (!b) return;
                            const div = document.createElement('div');
                            div.className = 'badge-container'; div.dataset.system = '1';
                            div.innerHTML = `<img src="${b.src}" alt="${b.label}" class="badge-img"><span class="tooltip">${b.label}</span>`;
                            document.querySelector('.name-row').appendChild(div);
                        });
                    }
                    if (p.tgGiftUrl) {
                        const _m = p.tgGiftUrl.match(/t\.me\/nft\/([^/?#]+)/);
                        if (_m) {
                            const _part = _m[1], _ld = _part.lastIndexOf('-');
                            if (_ld > 0) {
                                const _name = _part.slice(0, _ld).replace(/[^a-z0-9]/gi,'').toLowerCase();
                                const _num = _part.slice(_ld + 1);
                                if (_name && /^\d+$/.test(_num)) {
                                    const _div = document.createElement('div');
                                    _div.className = 'badge-container'; _div.dataset.system = '1';
                                    const _a = document.createElement('a');
                                    _a.href = p.tgGiftUrl; _a.target = '_blank'; _a.rel = 'noopener'; _a.style.display = 'inline-block';
                                    const _img = document.createElement('img');
                                    _img.src = `https://nft.fragment.com/gift/${_name}-${_num}.webp`;
                                    _img.alt = _part; _img.className = 'badge-img';
                                    _img.style.cssText = 'border-radius:3px;border:1px solid rgba(255,255,255,0.2)';
                                    _img.onerror = function(){ this.closest('.badge-container').style.display='none'; };
                                    _a.appendChild(_img); _div.appendChild(_a);
                                    const _tt = document.createElement('span');
                                    _tt.className = 'tooltip'; _tt.textContent = _part;
                                    _div.appendChild(_tt);
                                    document.querySelector('.name-row').appendChild(_div);
                                }
                            }
                        }
                    }
                    if (p.bioStatements?.length) { phrases = p.bioStatements; pIdx = 0; cIdx = 0; isDeleting = false; }
                    if (p.musicEnabled && p.musicUrl) {
                        audio.src = p.musicUrl;
                        document.querySelector('.track-name').textContent = p.musicTitle || 'untitled';
                    }
                    if (p.tabs?.length) {
                        document.querySelectorAll('.nav-group').forEach(g => g.remove());
                        const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                        const footer = document.querySelector('.console-footer');
                        p.tabs.forEach(tab => {
                            if (!tab.buttons?.length) return;
                            const group = document.createElement('div');
                            group.className = 'nav-group';
                            group.innerHTML = `<span class="section-label">${esc(tab.label)}</span>`;
                            tab.buttons.forEach(btn => {
                                if (btn.type === 'copy') {
                                    const b = document.createElement('button'); b.className = 'hub-btn'; b.textContent = btn.text;
                                    b.onclick = () => copyToClipboard(btn.value); group.appendChild(b);
                                } else {
                                    const a = document.createElement('a'); a.className = 'hub-btn'; a.href = btn.url;
                                    a.target = '_blank'; a.rel = 'noopener noreferrer'; a.textContent = btn.text; group.appendChild(a);
                                }
                            });
                            document.getElementById('main-content').insertBefore(group, footer);
                        });
                    }
                    if (p.footer) document.querySelector('.console-footer').textContent = p.footer;
                    if (p.background) bg = p.background;
                    if (p.bgUrl) { loadCustomBg(p.bgUrl, p.bgType || 'image'); bg = null; }
                    if (p.accentColor) { const hex=p.accentColor,r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),s=document.createElement('style');s.textContent=`:root{--glass:rgba(${r},${g},${b},0.08);--border:rgba(${r},${g},${b},0.3)}`;document.head.appendChild(s); }
                    if (p.visits) {
                        const vc = document.createElement('div');
                        vc.className = 'visit-count';
                        vc.textContent = p.visits.toLocaleString() + ' visits';
                        document.querySelector('header').appendChild(vc);
                    }
                    fetch('https://api.wrk.money/visit/$', { method: 'POST' }).catch(() => {});
                }
            } catch(e) {}
            if (bg) loadBackground(bg);
        }
        loadProfile();
    </script>
</body>
</html>
