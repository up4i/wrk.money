<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>file share | wrk.money</title>
    <meta name="description" content="upload a file. get a link.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wrk.money/tools/fileshare">
    <meta property="og:title" content="file share | wrk.money">
    <meta property="og:description" content="upload a file. get a link.">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            padding: 60px 20px;
        }

        #tsparticles {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 520px;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 32px;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.7; }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-bottom: 16px;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.05);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 1.8rem;
            opacity: 0.2;
            margin-bottom: 12px;
        }

        .drop-label {
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .drop-sublabel {
            font-size: 0.6rem;
            opacity: 0.2;
            letter-spacing: 1px;
        }

        .file-selected {
            display: none;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 16px 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .file-selected.visible { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

        .file-info { flex: 1; min-width: 0; }
        .file-name {
            font-size: 0.75rem;
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .file-size { font-size: 0.6rem; opacity: 0.3; letter-spacing: 1px; }

        .clear-file {
            font-size: 0.65rem;
            opacity: 0.3;
            cursor: pointer;
            padding: 4px 8px;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #fff;
            letter-spacing: 0;
        }
        .clear-file:hover { opacity: 0.7; }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .controls-label {
            font-size: 0.6rem;
            opacity: 0.3;
            letter-spacing: 2px;
        }

        select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:hover, select:focus { border-color: rgba(255,255,255,0.4); }
        select option { background: #111; }

        button.upload-btn {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button.upload-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.5);
        }
        button.upload-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .progress-wrap {
            display: none;
            margin-top: 12px;
        }
        .progress-wrap.visible { display: block; }
        .progress-bar-bg {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s;
        }
        .progress-label {
            font-size: 0.6rem;
            opacity: 0.3;
            letter-spacing: 1px;
            margin-top: 6px;
            text-align: center;
        }

        .result-card {
            display: none;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 20px 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-top: 16px;
        }
        .result-card.visible { display: block; }

        .result-label {
            font-size: 0.6rem;
            opacity: 0.35;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-url-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .result-url {
            flex: 1;
            font-size: 0.8rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
            word-break: break-all;
            transition: opacity 0.2s;
        }
        .result-url:hover { opacity: 1; }

        .copy-btn {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }

        .error-msg {
            display: none;
            font-size: 0.7rem;
            color: #ff6b6b;
            opacity: 0.8;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .error-msg.visible { display: block; }

        .console-footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.6rem;
            opacity: 0.2;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
            left: 0;
            z-index: 1;
        }
    </style>
    <script>if (!localStorage.getItem('wrk_token')) location.replace('/login?from=/tools/fileshare');</script>
</head>
<body>

<div id="tsparticles"></div>

<div class="container">
    <a href="/tools" class="back-link">← tools</a>
    <h1>file share</h1>

    <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input">
        <div class="drop-icon">↑</div>
        <div class="drop-label">drop file or click to browse</div>
        <div class="drop-sublabel">max 100mb</div>
    </div>

    <div class="file-selected" id="file-selected">
        <div class="file-info">
            <div class="file-name" id="file-name"></div>
            <div class="file-size" id="file-size"></div>
        </div>
        <button class="clear-file" id="clear-file">✕</button>
    </div>

    <div class="controls-row">
        <span class="controls-label">expires</span>
        <select id="ttl">
            <option value="1d">1 day</option>
            <option value="7d" selected>7 days</option>
            <option value="30d">30 days</option>
            <option value="never">never</option>
        </select>
    </div>

    <button class="upload-btn" id="upload-btn" disabled>upload</button>

    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">uploading...</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="result-card" id="result-card">
        <div class="result-label">FILE UPLOADED</div>
        <div class="result-url-row">
            <a class="result-url" id="result-url" href="#" target="_blank"></a>
            <button class="copy-btn" id="copy-btn">copy</button>
        </div>
    </div>
</div>

<div class="console-footer">FILE.READY // WRK_03</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" },
            shape: { type: "circle" },
            opacity: { value: 0.3 },
            size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
        },
        interactivity: {
            events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
            modes: { grab: { distance: 140, links: { opacity: 0.5 } }, push: { quantity: 4 } }
        },
        retina_detect: true
    });

    let selectedFile = null;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileSelected = document.getElementById('file-selected');
    const fileName = document.getElementById('file-name');
    const fileSize = document.getElementById('file-size');
    const clearFile = document.getElementById('clear-file');
    const uploadBtn = document.getElementById('upload-btn');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    const resultCard = document.getElementById('result-card');
    const resultUrl = document.getElementById('result-url');
    const copyBtn = document.getElementById('copy-btn');
    const errorMsg = document.getElementById('error-msg');

    function formatBytes(bytes) {
        if (bytes < 1024) return `${bytes} b`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} kb`;
        return `${(bytes / 1024 / 1024).toFixed(1)} mb`;
    }

    function setFile(file) {
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = formatBytes(file.size);
        fileSelected.classList.add('visible');
        uploadBtn.disabled = false;
        resultCard.classList.remove('visible');
        errorMsg.classList.remove('visible');
    }

    function clearSelection() {
        selectedFile = null;
        fileInput.value = '';
        fileSelected.classList.remove('visible');
        uploadBtn.disabled = true;
    }

    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    clearFile.addEventListener('click', clearSelection);

    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        uploadBtn.disabled = true;
        errorMsg.classList.remove('visible');
        resultCard.classList.remove('visible');
        progressWrap.classList.add('visible');
        progressFill.style.width = '0%';
        progressLabel.textContent = 'uploading...';

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('ttl', document.getElementById('ttl').value);

        try {
            // Use XMLHttpRequest for progress tracking
            const url = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', 'https://api.wrk.money/d');

                xhr.upload.addEventListener('progress', e => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = `${pct}%`;
                        progressLabel.textContent = `${pct}% — ${formatBytes(e.loaded)} / ${formatBytes(e.total)}`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        const data = JSON.parse(xhr.responseText);
                        resolve(data.url);
                    } else {
                        const data = JSON.parse(xhr.responseText);
                        reject(new Error(data.error || 'upload failed'));
                    }
                });

                xhr.addEventListener('error', () => reject(new Error('network error')));
                xhr.send(formData);
            });

            progressFill.style.width = '100%';
            progressLabel.textContent = 'done';

            resultUrl.href = url;
            resultUrl.textContent = url;
            resultCard.classList.add('visible');
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.classList.add('visible');
            progressWrap.classList.remove('visible');
        } finally {
            uploadBtn.disabled = false;
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(resultUrl.href).then(() => {
            copyBtn.textContent = 'copied!';
            setTimeout(() => copyBtn.textContent = 'copy', 2000);
        });
    });
</script>
</body>
</html>
