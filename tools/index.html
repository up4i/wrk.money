<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tools | wrk.money</title>
    <meta name="title" content="tools | wrk.money">
    <meta name="description" content="a small collection of tools by wrk.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wrk.money/tools">
    <meta property="og:title" content="tools | wrk.money">
    <meta property="og:description" content="a small collection of tools by wrk.">

    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">

    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #0a0a0a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 32px;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.7; }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-btn {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 20px 22px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            text-transform: lowercase;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tool-name {
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .tool-desc {
            font-size: 0.65rem;
            opacity: 0.35;
            letter-spacing: 1px;
        }

        .console-footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.65rem;
            opacity: 0.25;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="container" id="panel" style="display:none">
        <a href="/" class="back-link">← wrk.money</a>
        <h1>tools</h1>
        <nav class="nav-list">
            <a href="/tools/ip-checker" class="tool-btn">
                <span class="tool-name">ip / url checker</span>
                <span class="tool-desc">geolocation · network info · reputation links</span>
            </a>
            <a href="/tools/pastebin" class="tool-btn">
                <span class="tool-name">pastebin</span>
                <span class="tool-desc">paste text · syntax highlighting · expiring links</span>
            </a>
            <a href="/tools/fileshare" class="tool-btn">
                <span class="tool-name">file share</span>
                <span class="tool-desc">upload a file · get a download link · optional expiry</span>
            </a>
            <a href="/tools/shortener" class="tool-btn">
                <span class="tool-name">url shortener</span>
                <span class="tool-desc">shorten any url · custom slugs · wrk.money/s/...</span>
            </a>
        </nav>
    </div>

    <div class="console-footer">
        TOOLS.LOADED // WRK_01
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
    <script>
    const token = localStorage.getItem('wrk_token');
    if (!token) {
        window.location.href = '/login?from=/tools';
    } else {
        fetch('https://api.wrk.money/auth/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        }).then(r => {
            if (r.ok) {
                document.getElementById('panel').style.display = 'block';
            } else {
                localStorage.removeItem('wrk_token');
                localStorage.removeItem('wrk_slug');
                window.location.href = '/login?from=/tools';
            }
        }).catch(() => {
            document.getElementById('panel').style.display = 'block';
        });
    }
    </script>
    <script>
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 80, density: { enable: true, area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.3 },
                size: { value: { min: 1, max: 3 } },
                links: {
                    enable: true,
                    distance: 150,
                    color: "#ffffff",
                    opacity: 0.2,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    outModes: { default: "out" }
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" }
                },
                modes: {
                    grab: { distance: 140, links: { opacity: 0.5 } },
                    push: { quantity: 4 }
                }
            },
            retina_detect: true
        });
    </script>
</body>
</html>
