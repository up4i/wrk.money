<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pastebin | wrk.money</title>
    <meta name="description" content="paste text. get a link.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wrk.money/tools/pastebin">
    <meta property="og:title" content="pastebin | wrk.money">
    <meta property="og:description" content="paste text. get a link.">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root {
            --accent: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: var(--text);
            position: relative;
            padding: 60px 20px;
        }

        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 720px;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 32px;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.7; }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-bottom: 16px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        select {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        select:hover, select:focus { border-color: rgba(255,255,255,0.4); }
        select option { background: #111; }

        textarea {
            width: 100%;
            min-height: 360px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            padding: 16px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            tab-size: 4;
        }
        textarea:focus { border-color: rgba(255,255,255,0.35); }
        textarea::placeholder { opacity: 0.2; }

        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .char-count {
            font-size: 0.6rem;
            opacity: 0.25;
            letter-spacing: 1px;
        }

        button {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.5);
        }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        .result-card {
            display: none;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 20px 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .result-card.visible { display: block; }

        .result-label {
            font-size: 0.6rem;
            opacity: 0.35;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-url-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .result-url {
            flex: 1;
            font-size: 0.8rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
            word-break: break-all;
            transition: opacity 0.2s;
        }
        .result-url:hover { opacity: 1; }

        .copy-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            font-size: 0.65rem;
        }

        .error-msg {
            display: none;
            font-size: 0.7rem;
            color: #ff6b6b;
            opacity: 0.8;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .error-msg.visible { display: block; }

        .console-footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.6rem;
            opacity: 0.2;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
            left: 0;
            z-index: 1;
        }
    </style>
    <script>if (!localStorage.getItem('wrk_token')) location.replace('/login?from=/tools/pastebin');</script>
</head>
<body>

<div id="tsparticles"></div>

<div class="container">
    <a href="/tools" class="back-link">← tools</a>
    <h1>pastebin</h1>

    <div class="card">
        <div class="controls">
            <select id="lang">
                <option value="plaintext">plaintext</option>
                <option value="python">python</option>
                <option value="javascript">javascript</option>
                <option value="typescript">typescript</option>
                <option value="html">html</option>
                <option value="css">css</option>
                <option value="bash">bash</option>
                <option value="json">json</option>
                <option value="sql">sql</option>
                <option value="markdown">markdown</option>
                <option value="yaml">yaml</option>
                <option value="go">go</option>
                <option value="rust">rust</option>
                <option value="c">c</option>
                <option value="cpp">c++</option>
            </select>
            <select id="ttl">
                <option value="3600">1 hour</option>
                <option value="86400">1 day</option>
                <option value="604800" selected>7 days</option>
                <option value="2592000">30 days</option>
            </select>
        </div>

        <textarea id="content" placeholder="paste your text here..."></textarea>

        <div class="bottom-row">
            <span class="char-count" id="char-count">0 / 500,000</span>
            <button id="submit-btn">create paste</button>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="result-card" id="result-card">
        <div class="result-label">PASTE CREATED</div>
        <div class="result-url-row">
            <a class="result-url" id="result-url" href="#" target="_blank"></a>
            <button class="copy-btn" id="copy-btn">copy</button>
        </div>
    </div>
</div>

<div class="console-footer">PASTE.READY // WRK_02</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" },
            shape: { type: "circle" },
            opacity: { value: 0.3 },
            size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
        },
        interactivity: {
            events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
            modes: { grab: { distance: 140, links: { opacity: 0.5 } }, push: { quantity: 4 } }
        },
        retina_detect: true
    });

    const contentEl = document.getElementById('content');
    const charCount = document.getElementById('char-count');
    const submitBtn = document.getElementById('submit-btn');
    const resultCard = document.getElementById('result-card');
    const resultUrl = document.getElementById('result-url');
    const copyBtn = document.getElementById('copy-btn');
    const errorMsg = document.getElementById('error-msg');

    contentEl.addEventListener('input', () => {
        const len = contentEl.value.length;
        charCount.textContent = `${len.toLocaleString()} / 500,000`;
        charCount.style.opacity = len > 480000 ? '0.7' : '0.25';
    });

    submitBtn.addEventListener('click', async () => {
        const content = contentEl.value.trim();
        if (!content) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'creating...';
        errorMsg.classList.remove('visible');
        resultCard.classList.remove('visible');

        try {
            const res = await fetch('https://api.wrk.money/p', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content,
                    lang: document.getElementById('lang').value,
                    ttl: parseInt(document.getElementById('ttl').value),
                }),
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.error || 'something went wrong');

            resultUrl.href = data.url;
            resultUrl.textContent = data.url;
            resultCard.classList.add('visible');
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.classList.add('visible');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'create paste';
        }
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(resultUrl.href).then(() => {
            copyBtn.textContent = 'copied!';
            setTimeout(() => copyBtn.textContent = 'copy', 2000);
        });
    });
</script>
</body>
</html>
