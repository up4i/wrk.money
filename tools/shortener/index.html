<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="shorten a url. get a clean link.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wrk.money/tools/shortener">
    <meta property="og:title" content="url shortener | wrk.money">
    <meta property="og:description" content="shorten a url. get a clean link.">
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/wrk_files/999circle.png" type="image/png">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }

        body {
            background-color: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
            padding: 60px 20px;
        }

        #tsparticles {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 520px;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            font-size: 0.65rem;
            opacity: 0.3;
            letter-spacing: 2px;
            text-decoration: none;
            color: #fff;
            margin-bottom: 32px;
            transition: opacity 0.2s;
        }
        .back-link:hover { opacity: 0.7; }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 28px 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-bottom: 16px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 0.6rem;
            opacity: 0.3;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"], input[type="url"] {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 12px 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: rgba(255,255,255,0.35); }
        input::placeholder { opacity: 0.2; }

        .slug-row {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .slug-row:focus-within { border-color: rgba(255,255,255,0.35); }

        .slug-prefix {
            font-size: 0.75rem;
            opacity: 0.3;
            padding: 12px 0 12px 14px;
            white-space: nowrap;
            letter-spacing: 0;
        }

        .slug-row input {
            border: none;
            background: transparent;
            padding-left: 4px;
            font-size: 0.8rem;
        }
        .slug-row input:focus { border-color: transparent; }

        .hint {
            font-size: 0.58rem;
            opacity: 0.2;
            letter-spacing: 1px;
            margin-top: 6px;
        }

        button.submit-btn {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        button.submit-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.13);
            border-color: rgba(255,255,255,0.5);
        }
        button.submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .result-card {
            display: none;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 20px 24px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .result-card.visible { display: block; }

        .result-label {
            font-size: 0.6rem;
            opacity: 0.35;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-url-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .result-url {
            flex: 1;
            font-size: 0.85rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
            word-break: break-all;
            transition: opacity 0.2s;
        }
        .result-url:hover { opacity: 1; }

        .copy-btn {
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.4);
        }

        .error-msg {
            display: none;
            font-size: 0.7rem;
            color: #ff6b6b;
            opacity: 0.8;
            margin-top: 12px;
            letter-spacing: 1px;
        }
        .error-msg.visible { display: block; }

        .console-footer {
            position: fixed;
            bottom: 30px;
            font-size: 0.6rem;
            opacity: 0.2;
            letter-spacing: 4px;
            width: 100%;
            text-align: center;
            left: 0;
            z-index: 1;
        }
    </style>
    <script>if (!localStorage.getItem('wrk_token')) location.replace('/login?from=/tools/shortener');</script>
</head>
<body>

<div id="tsparticles"></div>

<div class="container">
    <a href="/tools" class="back-link">← tools</a>
    <h1>url shortener</h1>

    <div class="card">
        <div class="field">
            <label class="field-label" for="long-url">destination url</label>
            <input type="url" id="long-url" placeholder="https://example.com/very/long/url">
        </div>

        <div class="field">
            <label class="field-label" for="custom-slug">custom slug <span style="opacity:0.4">(optional)</span></label>
            <div class="slug-row">
                <span class="slug-prefix">wrk.money/s/</span>
                <input type="text" id="custom-slug" placeholder="leave blank for random">
            </div>
            <div class="hint">lowercase letters, numbers, hyphens only</div>
        </div>

        <button class="submit-btn" id="submit-btn">shorten</button>
        <div class="error-msg" id="error-msg"></div>
    </div>

    <div class="result-card" id="result-card">
        <div class="result-label">LINK CREATED</div>
        <div class="result-url-row">
            <a class="result-url" id="result-url" href="#" target="_blank"></a>
            <button class="copy-btn" id="copy-btn">copy</button>
        </div>
    </div>
</div>

<div class="console-footer">SHORT.READY // WRK_04</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tsparticles/2.12.0/tsparticles.bundle.min.js"></script>
<script>
    tsParticles.load("tsparticles", {
        particles: {
            number: { value: 80, density: { enable: true, area: 800 } },
            color: { value: "#ffffff" },
            shape: { type: "circle" },
            opacity: { value: 0.3 },
            size: { value: { min: 1, max: 3 } },
            links: { enable: true, distance: 150, color: "#ffffff", opacity: 0.2, width: 1 },
            move: { enable: true, speed: 1, direction: "none", outModes: { default: "out" } }
        },
        interactivity: {
            events: { onHover: { enable: true, mode: "grab" }, onClick: { enable: true, mode: "push" } },
            modes: { grab: { distance: 140, links: { opacity: 0.5 } }, push: { quantity: 4 } }
        },
        retina_detect: true
    });

    const longUrlEl = document.getElementById('long-url');
    const customSlugEl = document.getElementById('custom-slug');
    const submitBtn = document.getElementById('submit-btn');
    const resultCard = document.getElementById('result-card');
    const resultUrl = document.getElementById('result-url');
    const copyBtn = document.getElementById('copy-btn');
    const errorMsg = document.getElementById('error-msg');

    // sanitize slug input live
    customSlugEl.addEventListener('input', () => {
        customSlugEl.value = customSlugEl.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
    });

    submitBtn.addEventListener('click', async () => {
        const url = longUrlEl.value.trim();
        if (!url) return;

        try { new URL(url); } catch {
            errorMsg.textContent = 'enter a valid url';
            errorMsg.classList.add('visible');
            return;
        }

        const slug = customSlugEl.value.trim() || undefined;

        submitBtn.disabled = true;
        submitBtn.textContent = 'creating...';
        errorMsg.classList.remove('visible');
        resultCard.classList.remove('visible');

        try {
            const res = await fetch('https://api.wrk.money/s', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, ...(slug && { slug }) }),
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'something went wrong');

            resultUrl.href = data.url;
            resultUrl.textContent = data.url;
            resultCard.classList.add('visible');
        } catch (e) {
            errorMsg.textContent = e.message;
            errorMsg.classList.add('visible');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'shorten';
        }
    });

    longUrlEl.addEventListener('keydown', e => { if (e.key === 'Enter') submitBtn.click(); });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(resultUrl.href).then(() => {
            copyBtn.textContent = 'copied!';
            setTimeout(() => copyBtn.textContent = 'copy', 2000);
        });
    });
</script>
</body>
</html>
